<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PvZ Heroes Contexto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
 :root {
 --green: #5db94e;
 --green-dark: #3d8a30;
 --green-light: #c6f0bf;
 --yellow: #f5c518;
 --yellow-dark: #c9981a;
 --red: #e84040;
 --red-dark: #b52b2b;
 --purple: #7c4dff;
 --blue: #2196f3;
 --bg: #1a1f2e;
 --bg2: #242b3d;
 --bg3: #2e3650;
 --card: #1e2535;
 --border: #3a4460;
 --text: #e8eaf0;
 --text-muted: #8892aa;
 --shadow: 0 4px 20px rgba(0,0,0,0.4);
 }

 * { box-sizing: border-box; margin: 0; padding: 0; }

 body {
 font-family: 'Nunito', sans-serif;
 background: var(--bg);
 color: var(--text);
 min-height: 100vh;
 overflow-x: hidden;
 }

 /* Background grass texture */
 body::before {
 content: '';
 position: fixed;
 inset: 0;
 background:
 radial-gradient(ellipse at 20% 80%, rgba(93,185,78,0.08) 0%, transparent 50%),
 radial-gradient(ellipse at 80% 20%, rgba(124,77,255,0.06) 0%, transparent 50%),
 radial-gradient(ellipse at 50% 50%, rgba(33,150,243,0.04) 0%, transparent 70%);
 pointer-events: none;
 z-index: 0;
 }

 .container {
 max-width: 680px;
 margin: 0 auto;
 padding: 0 16px 80px;
 position: relative;
 z-index: 1;
 }

 /* HEADER */
 header {
 text-align: center;
 padding: 24px 0 20px;
 border-bottom: 1px solid var(--border);
 margin-bottom: 24px;
 }

 .logo {
 font-family: 'Fredoka One', cursive;
 font-size: 2.4rem;
 letter-spacing: 1px;
 background: linear-gradient(135deg, #5db94e, #a8e063);
 -webkit-background-clip: text;
 -webkit-text-fill-color: transparent;
 background-clip: text;
 line-height: 1;
 margin-bottom: 4px;
 }

 .logo span {
 background: linear-gradient(135deg, #f5c518, #ff9800);
 -webkit-background-clip: text;
 -webkit-text-fill-color: transparent;
 background-clip: text;
 }

 .subtitle {
 font-size: 0.82rem;
 color: var(--text-muted);
 letter-spacing: 0.5px;
 font-weight: 600;
 text-transform: uppercase;
 }

 .header-meta {
 display: flex;
 justify-content: center;
 gap: 20px;
 margin-top: 12px;
 font-size: 0.8rem;
 color: var(--text-muted);
 }

 .header-meta span {
 display: flex;
 align-items: center;
 gap: 4px;
 }

 /* SEARCH BAR */
 .search-section {
 position: sticky;
 top: 0;
 z-index: 100;
 background: var(--bg);
 padding: 12px 0;
 border-bottom: 1px solid var(--border);
 margin-bottom: 20px;
 }

 .input-wrap {
 position: relative;
 }

 .input-wrap input {
 width: 100%;
 padding: 14px 18px 14px 18px;
 background: var(--bg2);
 border: 2px solid var(--border);
 border-radius: 14px;
 color: var(--text);
 font-family: 'Nunito', sans-serif;
 font-size: 1rem;
 font-weight: 700;
 outline: none;
 transition: border-color 0.2s, box-shadow 0.2s;
 }

 .input-wrap input:focus {
 border-color: var(--green);
 box-shadow: 0 0 0 3px rgba(93,185,78,0.15);
 }

 .input-wrap input::placeholder {
 color: var(--text-muted);
 font-weight: 600;
 }

 .guess-btn {
 position: absolute;
 right: 8px;
 top: 50%;
 transform: translateY(-50%);
 background: var(--green);
 border: none;
 border-radius: 10px;
 color: white;
 font-family: 'Fredoka One', cursive;
 font-size: 0.9rem;
 padding: 7px 14px;
 cursor: pointer;
 transition: background 0.15s, transform 0.1s;
 }

 .guess-btn:hover { background: var(--green-dark); }
 .guess-btn:active { transform: translateY(-50%) scale(0.95); }

 /* AUTOCOMPLETE */
 .autocomplete-list {
 position: absolute;
 top: calc(100% + 4px);
 left: 0; right: 0;
 background: var(--bg2);
 border: 1px solid var(--border);
 border-radius: 12px;
 overflow: hidden;
 box-shadow: var(--shadow);
 z-index: 200;
 max-height: 280px;
 overflow-y: auto;
 }

 .autocomplete-item {
 display: flex;
 align-items: center;
 gap: 10px;
 padding: 8px 14px;
 cursor: pointer;
 transition: background 0.1s;
 }

 .autocomplete-item:hover, .autocomplete-item.active {
 background: var(--bg3);
 }

 .autocomplete-item img {
 width: 32px;
 height: 32px;
 object-fit: contain;
 border-radius: 6px;
 background: var(--bg3);
 flex-shrink: 0;
 }

 .autocomplete-item .ac-name {
 font-weight: 700;
 font-size: 0.9rem;
 }

 .autocomplete-item .ac-meta {
 font-size: 0.72rem;
 color: var(--text-muted);
 font-weight: 600;
 }

 /* STATS BAR */
 .stats-bar {
 display: flex;
 gap: 10px;
 margin-bottom: 20px;
 justify-content: center;
 }

 .stat-chip {
 background: var(--bg2);
 border: 1px solid var(--border);
 border-radius: 10px;
 padding: 8px 16px;
 text-align: center;
 min-width: 80px;
 }

 .stat-chip .val {
 font-family: 'Fredoka One', cursive;
 font-size: 1.5rem;
 line-height: 1;
 color: var(--green);
 }

 .stat-chip .lbl {
 font-size: 0.65rem;
 color: var(--text-muted);
 text-transform: uppercase;
 letter-spacing: 0.5px;
 font-weight: 700;
 margin-top: 2px;
 }

 /* GUESS LIST */
 .guesses-header {
 display: grid;
 grid-template-columns: 44px 1fr 70px;
 gap: 8px;
 padding: 0 10px 6px;
 font-size: 0.68rem;
 font-weight: 800;
 text-transform: uppercase;
 letter-spacing: 0.8px;
 color: var(--text-muted);
 border-bottom: 1px solid var(--border);
 margin-bottom: 8px;
 }

 .guesses-list {
 display: flex;
 flex-direction: column;
 gap: 6px;
 }

 .guess-card {
 display: grid;
 grid-template-columns: 44px 1fr 70px;
 align-items: center;
 gap: 8px;
 background: var(--bg2);
 border: 1px solid var(--border);
 border-radius: 12px;
 padding: 8px 10px;
 animation: slideIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
 position: relative;
 overflow: hidden;
 }

 @keyframes slideIn {
 from { opacity: 0; transform: translateY(-10px) scale(0.97); }
 to { opacity: 1; transform: translateY(0) scale(1); }
 }

 .guess-card::before {
 content: '';
 position: absolute;
 left: 0; top: 0; bottom: 0;
 width: 4px;
 border-radius: 12px 0 0 12px;
 }

 .guess-card.hot::before { background: var(--red); }
 .guess-card.warm::before { background: var(--yellow); }
 .guess-card.cool::before { background: var(--blue); }
 .guess-card.cold::before { background: var(--text-muted); }
 .guess-card.correct { border-color: var(--green); animation: winner 0.6s ease; }
 .guess-card.correct::before { background: var(--green); }

 @keyframes winner {
 0% { transform: scale(1); }
 30% { transform: scale(1.03); }
 60% { transform: scale(0.99); }
 100% { transform: scale(1); }
 }

 .guess-img-wrap {
 width: 44px;
 height: 44px;
 background: var(--bg3);
 border-radius: 8px;
 display: flex;
 align-items: center;
 justify-content: center;
 flex-shrink: 0;
 overflow: hidden;
 }

 .guess-img-wrap img {
 width: 42px;
 height: 42px;
 object-fit: contain;
 }

 .guess-info {
 overflow: hidden;
 }

 .guess-name {
 font-weight: 800;
 font-size: 0.95rem;
 white-space: nowrap;
 overflow: hidden;
 text-overflow: ellipsis;
 }

 .guess-tags {
 display: flex;
 flex-wrap: wrap;
 gap: 3px;
 margin-top: 3px;
 }

 .tag {
 font-size: 0.6rem;
 font-weight: 700;
 padding: 1px 6px;
 border-radius: 100px;
 text-transform: uppercase;
 letter-spacing: 0.3px;
 }

 .stat-tag {
 display: inline-flex;
 align-items: center;
 gap: 3px;
 background: var(--bg3) !important;
 color: var(--text) !important;
 padding: 2px 5px !important;
 }

 .stat-icon {
 width: 16px;
 height: 16px;
 object-fit: contain;
 flex-shrink: 0;
 image-rendering: auto;
 }

 .tag.class-guardian { background: #1a4a2e; color: #5db94e; }
 .tag.class-kabloom { background: #4a1a2e; color: #f56a8e; }
 .tag.class-mega-grow { background: #2e4a1a; color: #8ee04d; }
 .tag.class-smarty { background: #1a2e4a; color: #4db8e0; }
 .tag.class-solar { background: #4a3a1a; color: #f0c440; }
 .tag.class-beastly { background: #3a1a4a; color: #b04de0; }
 .tag.class-brainy { background: #1a3a4a; color: #4de0c8; }
 .tag.class-crazy { background: #4a1a1a; color: #e04d4d; }
 .tag.class-hearty { background: #2e1a4a; color: #8b4de0; }
 .tag.class-sneaky { background: #3a3a1a; color: #d4e04d; }
 .tag.type-plant { background: #1e3d1a; color: #6dcc5a; }
 .tag.type-zombie { background: #3d1a1a; color: #cc6a5a; }
 .tag.type-trick { background: #1a2e3d; color: #5a9acc; }
 .tag.type-environment { background: #2e3d1a; color: #9acc5a; }

 .guess-rank-wrap {
 text-align: right;
 }

 .rank-num {
 font-family: 'Fredoka One', cursive;
 font-size: 1.4rem;
 line-height: 1;
 }

 .rank-label {
 font-size: 0.6rem;
 color: var(--text-muted);
 font-weight: 700;
 text-transform: uppercase;
 letter-spacing: 0.3px;
 }

 .rank-dot {
 display: inline-block;
 width: 8px;
 height: 8px;
 border-radius: 50%;
 margin-left: 4px;
 vertical-align: middle;
 }

 .rank-hot { color: var(--red); }
 .rank-warm { color: var(--yellow); }
 .rank-cool { color: var(--blue); }
 .rank-cold { color: var(--text-muted); }
 .rank-correct { color: var(--green); }

 /* WIN MODAL */
 .modal-overlay {
 position: fixed;
 inset: 0;
 background: rgba(0,0,0,0.75);
 display: flex;
 align-items: center;
 justify-content: center;
 z-index: 1000;
 padding: 20px;
 animation: fadeIn 0.3s ease;
 }

 @keyframes fadeIn {
 from { opacity: 0; }
 to { opacity: 1; }
 }

 .modal {
 background: var(--bg2);
 border: 1px solid var(--border);
 border-radius: 20px;
 padding: 28px 24px;
 max-width: 380px;
 width: 100%;
 text-align: center;
 animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
 position: relative;
 }

 @keyframes popIn {
 from { opacity: 0; transform: scale(0.85); }
 to { opacity: 1; transform: scale(1); }
 }

 .modal-emoji {
 font-size: 3.5rem;
 margin-bottom: 10px;
 line-height: 1;
 }

 .modal-title {
 font-family: 'Fredoka One', cursive;
 font-size: 1.8rem;
 color: var(--green);
 margin-bottom: 6px;
 }

 .modal-sub {
 color: var(--text-muted);
 font-size: 0.85rem;
 margin-bottom: 20px;
 }

 .modal-card-reveal {
 display: flex;
 align-items: center;
 gap: 14px;
 background: var(--bg3);
 border-radius: 14px;
 padding: 14px;
 margin-bottom: 20px;
 text-align: left;
 }

 .modal-card-reveal img {
 width: 64px;
 height: 64px;
 object-fit: contain;
 border-radius: 10px;
 background: var(--bg);
 padding: 4px;
 }

 .modal-card-name {
 font-family: 'Fredoka One', cursive;
 font-size: 1.2rem;
 margin-bottom: 4px;
 }

 .modal-card-stats {
 font-size: 0.75rem;
 color: var(--text-muted);
 font-weight: 600;
 }

 .modal-stats {
 display: flex;
 justify-content: center;
 gap: 16px;
 margin-bottom: 20px;
 }

 .modal-stat { text-align: center; }
 .modal-stat .ms-val {
 font-family: 'Fredoka One', cursive;
 font-size: 1.8rem;
 color: var(--yellow);
 line-height: 1;
 }
 .modal-stat .ms-lbl {
 font-size: 0.65rem;
 color: var(--text-muted);
 text-transform: uppercase;
 font-weight: 700;
 letter-spacing: 0.4px;
 }

 .modal-btn {
 background: var(--green);
 color: white;
 border: none;
 border-radius: 12px;
 padding: 13px 28px;
 font-family: 'Fredoka One', cursive;
 font-size: 1rem;
 cursor: pointer;
 letter-spacing: 0.5px;
 transition: background 0.15s;
 width: 100%;
 }

 .modal-btn:hover { background: var(--green-dark); }

 .top10-section-wrap {
 margin-bottom: 16px;
 text-align: left;
 }

 .top10-title {
 font-size: 0.75rem;
 font-weight: 800;
 text-transform: uppercase;
 letter-spacing: 0.5px;
 color: var(--text-muted);
 margin-bottom: 8px;
 }

 .top10-section {
 max-height: 260px;
 overflow-y: auto;
 border-radius: 8px;
 }

 .top10-list {
 display: flex;
 flex-direction: column;
 gap: 4px;
 }

 .top10-sentinel {
 height: 8px;
 }

 .top10-item {
 display: flex;
 align-items: center;
 gap: 8px;
 background: var(--bg3);
 border-radius: 8px;
 padding: 5px 8px;
 font-size: 0.8rem;
 }

 .top10-rank {
 font-family: 'Fredoka One', cursive;
 font-size: 0.75rem;
 color: var(--yellow);
 min-width: 24px;
 }

 .top10-item img {
 width: 28px;
 height: 28px;
 object-fit: contain;
 border-radius: 4px;
 background: var(--bg);
 flex-shrink: 0;
 }

 .top10-name {
 font-weight: 700;
 flex: 1;
 white-space: nowrap;
 overflow: hidden;
 text-overflow: ellipsis;
 }

 .top10-meta {
 font-size: 0.7rem;
 color: var(--text-muted);
 font-weight: 600;
 flex-shrink: 0;
 }

 .show-result-btn {
 display: block;
 width: 100%;
 margin-top: 10px;
 padding: 10px;
 background: var(--bg2);
 border: 1px solid var(--green);
 border-radius: 10px;
 color: var(--green);
 font-family: 'Fredoka One', cursive;
 font-size: 0.9rem;
 cursor: pointer;
 letter-spacing: 0.3px;
 transition: background 0.15s;
 }

 .show-result-btn:hover { background: var(--bg3); }

 /* HOW TO PLAY */
 .how-to {
 background: var(--bg2);
 border: 1px solid var(--border);
 border-radius: 14px;
 padding: 14px 16px;
 margin-bottom: 20px;
 font-size: 0.82rem;
 color: var(--text-muted);
 line-height: 1.6;
 }

 .how-to strong {
 color: var(--text);
 font-weight: 800;
 }

 .how-to .legend {
 display: flex;
 flex-wrap: wrap;
 gap: 8px;
 margin-top: 8px;
 }

 .legend-item {
 display: flex;
 align-items: center;
 gap: 5px;
 font-size: 0.75rem;
 font-weight: 700;
 }

 .dot {
 width: 10px; height: 10px;
 border-radius: 50%;
 flex-shrink: 0;
 }

 .empty-state {
 text-align: center;
 padding: 40px 20px;
 color: var(--text-muted);
 }

 .empty-state .emoji { font-size: 3rem; margin-bottom: 10px; }
 .empty-state p { font-size: 0.9rem; font-weight: 600; }

 /* Error toast */
 .toast {
 position: fixed;
 bottom: 24px;
 left: 50%;
 transform: translateX(-50%) translateY(80px);
 background: var(--bg3);
 border: 1px solid var(--border);
 border-radius: 10px;
 padding: 10px 20px;
 font-size: 0.85rem;
 font-weight: 700;
 color: var(--text);
 z-index: 500;
 transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
 white-space: nowrap;
 }

 .toast.show { transform: translateX(-50%) translateY(0); }

 /* Scrollbar */
 ::-webkit-scrollbar { width: 6px; }
 ::-webkit-scrollbar-track { background: transparent; }
 ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

 @media (max-width: 480px) {
 .logo { font-size: 1.8rem; }
 .guess-name { font-size: 0.85rem; }
 .rank-num { font-size: 1.2rem; }
 }

 /* HEADER TOP */
 .header-top {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
 }

 .header-top .logo {
  text-align: center;
 }

 .header-top .header-right {
  position: absolute;
  right: 0;
  display: flex;
  align-items: center;
  gap: 8px;
 }

 .github-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-muted);
  width: 36px;
  height: 36px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s;
  text-decoration: none;
  flex-shrink: 0;
 }

 .github-btn:hover { background: var(--bg3); color: var(--text); }

 /* 3-DOT MENU */
 .menu-wrap {
  position: relative;
 }

 .menu-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 1.4rem;
  width: 36px;
  height: 36px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  transition: background 0.15s;
 }

 .menu-btn:hover { background: var(--bg3); }

 .dropdown {
  position: absolute;
  right: 0;
  top: calc(100% + 6px);
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: var(--shadow);
  z-index: 300;
  min-width: 150px;
 }

 .dropdown-item {
  display: block;
  width: 100%;
  padding: 11px 16px;
  background: none;
  border: none;
  color: var(--text);
  font-family: "Nunito", sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  text-align: left;
  cursor: pointer;
  transition: background 0.1s;
 }

 .dropdown-item:hover { background: var(--bg3); }
 .dropdown-item.danger { color: var(--red); }
 .dropdown-item.disabled {
  opacity: 0.4;
  pointer-events: none;
 }
 .dropdown-item + .dropdown-item { border-top: 1px solid var(--border); }

 /* HINT CARD */
 .guess-card.hint-card {
  opacity: 0.75;
  border-style: dashed;
 }

 .hint-badge {
  font-size: 0.6rem;
  font-weight: 800;
  background: var(--purple);
  color: white;
  border-radius: 4px;
  padding: 1px 5px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-left: 4px;
  vertical-align: middle;
 }

 /* MODAL OVERLAY for settings/howto */
 .side-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
  animation: fadeIn 0.2s ease;
 }

 .side-modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 24px;
  max-width: 360px;
  width: 100%;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
 }

 .side-modal h2 {
  font-family: "Fredoka One", cursive;
  font-size: 1.4rem;
  color: var(--green);
  margin-bottom: 14px;
 }

 .side-modal p, .side-modal li {
  font-size: 0.85rem;
  color: var(--text-muted);
  line-height: 1.7;
 }

 .side-modal ul { padding-left: 16px; margin-bottom: 10px; }

 .settings-row {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
 }

 .settings-label {
  font-size: 0.75rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 4px;
 }

 .difficulty-btn {
  padding: 10px 14px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--bg3);
  color: var(--text-muted);
  font-family: "Nunito", sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
 }

 .difficulty-btn.active {
  border-color: var(--green);
  color: var(--text);
  background: var(--bg2);
 }

 .difficulty-btn .diff-name {
  font-weight: 800;
  font-size: 0.9rem;
  color: var(--text);
  display: block;
  margin-bottom: 2px;
 }

 .difficulty-btn .diff-desc {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 600;
 }

 .side-modal-close {
  display: block;
  width: 100%;
  padding: 11px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: "Nunito", sans-serif;
  font-size: 0.9rem;
  font-weight: 800;
  cursor: pointer;
  margin-top: 16px;
  transition: background 0.15s;
 }

 .side-modal-close:hover { background: var(--border); }

 /* LEGEND in how-to modal */
 .modal-legend { display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
 .modal-legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }
 .modal-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

</style>
</head>
<body>

<div class="container">
 <header>
 <div class="header-top">
  <div class="logo">PvZ Heroes <span>Contexto</span></div>
  <div class="header-right">
   <div class="menu-wrap" id="menu-wrap">
    <button class="menu-btn" id="menu-btn" onclick="toggleMenu()">&#8942;</button>
    <div class="dropdown" id="dropdown" style="display:none">
     <button class="dropdown-item" onclick="closeMenu();showHowToPlay()">How to Play</button>
     <button class="dropdown-item" data-game-action onclick="closeMenu();useHint()">Hint</button>

<script>
// ============================================================
// GAME DATA — injected at build time
// ============================================================
const GAME_DATA_URL = null; // will be loaded inline below

// ============================================================
// GLOBALS
// ============================================================
let CARDS = [];
let RANKINGS = [];
let cardIndex = {}; // name.toLowerCase() -> index
let secretIdx = -1;
let guessedIndices = new Set();
let guessHistory = []; // [{idx, rank, isHint}]
let won = false;
let gaveUp = false;
let acActiveIdx = -1;
let hintCount = 0;
let hintDifficulty = localStorage.getItem('pvz-hint-difficulty') || 'easy';

// ============================================================
// DAILY CARD SELECTION
// ============================================================
function getDayNumber() {
 const epoch = new Date('2026-05-30T00:00:00Z');
 const now = new Date();
 return Math.floor((now - epoch) / 86400000);
}

// Deterministic shuffle from seed
function seededShuffle(arr, seed) {
 const a = [...arr.keys()];
 let s = seed;
 for (let i = a.length - 1; i > 0; i--) {
 s = (s * 1664525 + 1013904223) & 0xffffffff;
 const j = Math.abs(s) % (i + 1);
 [a[i], a[j]] = [a[j], a[i]];
 }
 return a;
}

function getTodaysCard() {
 const day = getDayNumber();
 const order = seededShuffle(CARDS, 42069);
 return order[day % CARDS.length];
}

// ============================================================
// INIT
// ============================================================
async function init() {
 // Inline game data
 const resp = await fetch('game_data.json');
 const data = await resp.json();
 CARDS = data.cards;
 RANKINGS = data.rankings;

 // Build name lookup
 CARDS.forEach((c, i) => { cardIndex[c.name.toLowerCase()] = i; });

 // Set daily card
 secretIdx = getTodaysCard();

 // Update UI
 const day = getDayNumber();
 document.getElementById('day-label').textContent = `Day ${(day % CARDS.length) + 1}`;

 // DEBUG: show secret card in console so you can verify win condition works
 console.log(`Today's card: "${CARDS[secretIdx].name}" (idx ${secretIdx})`);

 // Load saved state
 loadState();

 // Event listeners
 const input = document.getElementById('guess-input');
 input.addEventListener('input', onInput);
 input.addEventListener('keydown', onKeydown);
 document.addEventListener('click', (e) => {
 if (!document.getElementById('input-wrap').contains(e.target)) {
 closeAC();
 }
 });
}

// ============================================================
// AUTOCOMPLETE
// ============================================================
function onInput() {
 const q = document.getElementById('guess-input').value.trim().toLowerCase();
 if (!q) { closeAC(); return; }

 const matches = CARDS
 .filter(c => c.name.toLowerCase().includes(q))
 .slice(0, 8);

 if (!matches.length) { closeAC(); return; }

 acActiveIdx = -1;
 const list = document.getElementById('ac-list');
 list.style.display = 'block';
 list.innerHTML = matches.map((c, i) => `
 <div class="autocomplete-item" data-name="${c.name}" onmousedown="selectAC(event,'${c.name.replace(/'/g,"\\'")}')">
 <img src="${c.image}" alt="${c.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2232%22 height=%2232%22><rect fill=%22%23333%22 width=%2232%22 height=%2232%22 rx=%224%22/></svg>'">
 <div>
 <div class="ac-name">${c.name}</div>
 <div class="ac-meta">${c.class} • ${c.type} • Cost ${c.cost}</div>
 </div>
 </div>
 `).join('');
}

function selectAC(e, name) {
 e.preventDefault();
 document.getElementById('guess-input').value = name;
 closeAC();
 submitGuess();
}

function closeAC() {
 document.getElementById('ac-list').style.display = 'none';
 acActiveIdx = -1;
}

function onKeydown(e) {
 const list = document.getElementById('ac-list');
 const items = list.querySelectorAll('.autocomplete-item');
 if (e.key === 'ArrowDown') {
 e.preventDefault();
 acActiveIdx = Math.min(acActiveIdx + 1, items.length - 1);
 updateACHighlight(items);
 } else if (e.key === 'ArrowUp') {
 e.preventDefault();
 acActiveIdx = Math.max(acActiveIdx - 1, -1);
 updateACHighlight(items);
 } else if (e.key === 'Enter') {
 e.preventDefault();
 if (acActiveIdx >= 0 && items[acActiveIdx]) {
 document.getElementById('guess-input').value = items[acActiveIdx].dataset.name;
 closeAC();
 }
 submitGuess();
 } else if (e.key === 'Escape') {
 closeAC();
 }
}

function updateACHighlight(items) {
 items.forEach((el, i) => el.classList.toggle('active', i === acActiveIdx));
}

// ============================================================
// GUESS LOGIC
// ============================================================
function getRankForGuess(guessIdx) {
 // rank = position in secret card's ranking list (1-indexed)
 const ranking = RANKINGS[secretIdx];
 const pos = ranking.indexOf(guessIdx);
 return pos + 2; // 2 = most similar, secret = #1
}

function getTemperature(rank) {
 if (rank === 1) return 'correct';
 if (rank <= 26) return 'hot';
 if (rank <= 101) return 'warm';
 if (rank <= 251) return 'cool';
 return 'cold';
}

function getTempEmoji(temp) {
 return { correct: '#1', hot: 'hot', warm: 'warm', cool: 'cool', cold: 'cold' }[temp];
}

function submitGuess() {
 if (won) return;

 const input = document.getElementById('guess-input');
 const raw = input.value.trim();
 if (!raw) return;

 const lower = raw.toLowerCase();
 const idx = cardIndex[lower];

 if (idx === undefined) {
 showToast(`"${raw}" isn't a card!`);
 return;
 }

 if (guessedIndices.has(idx)) {
 showToast('Already guessed that one!');
 input.value = '';
 closeAC();
 return;
 }

 guessedIndices.add(idx);
 input.value = '';
 closeAC();

 let rank;
 let temp;
 if (idx === secretIdx) {
 rank = 1;
 temp = 'correct';
 } else {
 rank = getRankForGuess(idx);
 temp = getTemperature(rank);
 }

 if (temp === 'correct') {
 won = true;
 }

 guessHistory.push({ idx, rank, temp });
 // Sort: correct (rank 0) first, then ascending by rank
 guessHistory.sort((a, b) => {
 if (a.rank === 1) return -1;
 if (b.rank === 1) return 1;
 return a.rank - b.rank;
 });

 saveState();
 renderGuesses();
 updateStats();

 if (won) {
 setTimeout(() => showWinModal(), 700);
 }
}

// ============================================================
// RENDER
// ============================================================
function renderGuesses() {
 const list = document.getElementById('guesses-list');

 if (guessHistory.length === 0) {
 list.innerHTML = `
 <div class="empty-state" id="empty-state">
 
 <p>Start guessing to find the secret card</p>
 </div>`;
 return;
 }

 const showResultBtn = (won || gaveUp) ? `
 <button class="show-result-btn" onclick="${won ? 'showWinModal' : 'showGiveUpModal'}()">Show Result</button>
 ` : '';

 list.innerHTML = showResultBtn + guessHistory.map(({ idx, rank, temp, isHint }, i) => {
 const card = CARDS[idx];
 const isNew = i === 0;
 const rankDisplay = temp === 'correct' ? '#1 ✓' : `#${rank}`;
 const rankClass = `rank-${temp}`;

 const classSafe = card.class.toLowerCase().replace(/[^a-z]/g, '-');
 const typeSafe = card.type.toLowerCase();

 return `
 <div class="guess-card ${temp}${isHint ? ' hint-card' : ''}" ${isNew ? '' : 'style="animation:none"'}>
 <div class="guess-img-wrap">
 <img src="${card.image}" alt="${card.name}"
 onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2242%22 height=%2242%22><rect fill=%22%23333%22 width=%2242%22 height=%2242%22 rx=%226%22/><text x=%2250%%22 y=%2255%%22 font-size=%2220%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22></text></svg>'">
 </div>
 <div class="guess-info">
 <div class="guess-name">${card.name}${isHint ? '<span class="hint-badge">hint</span>' : ''}</div>
 <div class="guess-tags">
 <span class="tag class-${classSafe}">${card.class}</span>
 <span class="tag type-${typeSafe}">${card.type}</span>
 ${card.cost !== undefined ? `<span class="tag stat-tag"><img class="stat-icon" src="images/${['Guardian','Kabloom','Mega-Grow','Smarty','Solar'].includes(card.class) ? 'Sun' : 'Brain'}.webp">${card.cost}</span>` : ''}
 ${card.strength !== undefined && card.type !== 'Trick' && card.type !== 'Environment' ? `<span class="tag stat-tag"><img class="stat-icon" src="images/Strength.webp">${card.strength}</span>` : ''}
 ${card.health !== undefined && card.type !== 'Trick' && card.type !== 'Environment' ? `<span class="tag stat-tag"><img class="stat-icon" src="images/Health.webp">${card.health}</span>` : ''}
 </div>
 </div>
 <div class="guess-rank-wrap">
 <div class="rank-num ${rankClass}">${rankDisplay}</div>

 </div>
 </div>
 `;
 }).join('');
}

function updateStats() {
 const realGuesses = guessHistory.filter(g => !g.isHint).length;
 document.getElementById('guess-count').textContent = realGuesses;
 document.getElementById('hint-count').textContent = hintCount;
}

// ============================================================
// WIN MODAL
// ============================================================
function renderTopNItems(listEl, from, to) {
 const allRanked = RANKINGS[secretIdx];
 const items = allRanked.slice(from, to).map((cardIdx, i) => {
 const c = CARDS[cardIdx];
 const rank = from + i + 2; // +2 because secret = #1
 return `
 <div class="top10-item">
 <span class="top10-rank">#${rank}</span>
 <img src="${c.image}" alt="${c.name}"
 onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2228%22 height=%2228%22><rect fill=%22%23333%22 width=%2228%22 height=%2228%22 rx=%224%22/></svg>'">
 <span class="top10-name">${c.name}</span>
 <span class="top10-meta">${c.class}</span>
 </div>`;
 }).join('');
 listEl.insertAdjacentHTML('beforeend', items);
}

function showWinModal() {
 // Remove any existing modal
 const existing = document.querySelector('.modal-overlay');
 if (existing) existing.remove();

 const card = CARDS[secretIdx];
 const guesses = guessHistory.length;
 const PAGE = 10;
 let loadedUpTo = 0;

 const modal = document.createElement('div');
 modal.className = 'modal-overlay';
 modal.innerHTML = `
 <div class="modal">
 <div class="modal-emoji" style="font-size:1rem;letter-spacing:2px;color:var(--text-muted);font-weight:800;text-transform:uppercase;">PVZ HEROES</div>
 <div class="modal-title">Got it!</div>
 <div class="modal-sub">You found today's card in <strong>${guesses}</strong> guess${guesses === 1 ? '' : 'es'}!</div>

 <div class="modal-card-reveal">
 <img src="${card.image}" alt="${card.name}"
 onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2264%22 height=%2264%22><rect fill=%22%23333%22 width=%2264%22 height=%2264%22 rx=%228%22/></svg>'">
 <div>
 <div class="modal-card-name">${card.name}</div>
 <div class="modal-card-stats">
 ${card.class} · ${card.type}<br>
 ${card.tribes.length ? card.tribes.join(', ') + ' · ' : ''}Cost ${card.cost}<br>
 ${card.keywords.length ? card.keywords.join(', ') : 'No keywords'}
 </div>
 </div>
 </div>

 <div class="modal-stats">
 <div class="modal-stat">
 <div class="ms-val">${guesses}</div>
 <div class="ms-lbl">Guesses</div>
 </div>
 <div class="modal-stat">
 <div class="ms-val">${getStreak()}</div>
 <div class="ms-lbl">Streak</div>
 </div>
 </div>

 <div class="top10-section-wrap"><div class="top10-section">
 <div class="top10-title"> Closest cards to ${card.name}</div>
 <div class="top10-list" id="modal-top-list"></div>
 <div class="top10-sentinel" id="top10-sentinel"></div>
 </div></div>

 <button class="modal-btn" onclick="this.closest('.modal-overlay').remove()">Close</button>
 </div>
 `;
 document.body.appendChild(modal);

 // Load first batch immediately
 const listEl = modal.querySelector('#modal-top-list');
 renderTopNItems(listEl, 0, PAGE);
 loadedUpTo = PAGE;

 // Infinite scroll via IntersectionObserver on a sentinel at the bottom
 const sentinel = modal.querySelector('#top10-sentinel');
 const total = RANKINGS[secretIdx].length;

 const observer = new IntersectionObserver((entries) => {
 if (entries[0].isIntersecting && loadedUpTo < total) {
 const next = Math.min(loadedUpTo + PAGE, total);
 renderTopNItems(listEl, loadedUpTo, next);
 loadedUpTo = next;
 }
 }, { root: modal.querySelector('.top10-section'), threshold: 0.1 });

 observer.observe(sentinel);
}

// ============================================================
// PERSISTENCE
// ============================================================
function getStorageKey() {
 return `pvz-contexto-day-${getDayNumber() % CARDS.length}`;
}

function saveState() {
 const state = {
 guessHistory,
 won,
 gaveUp,
 hintCount,
 day: getDayNumber(),
 streak: computeNewStreak(),
 };
 localStorage.setItem(getStorageKey(), JSON.stringify(state));
 localStorage.setItem('pvz-contexto-streak', JSON.stringify({
 streak: computeNewStreak(),
 lastDay: getDayNumber()
 }));
}

function computeNewStreak() {
 const prev = JSON.parse(localStorage.getItem('pvz-contexto-streak') || '{"streak":0,"lastDay":-1}');
 const today = getDayNumber();
 if (won) {
 if (prev.lastDay === today - 1) return prev.streak + 1;
 if (prev.lastDay === today) return prev.streak;
 return 1;
 }
 return prev.streak;
}

function getStreak() {
 return JSON.parse(localStorage.getItem('pvz-contexto-streak') || '{"streak":0}').streak;
}

function loadState() {
 const saved = localStorage.getItem(getStorageKey());
 if (!saved) return;
 try {
 const state = JSON.parse(saved);
 if (state.day === getDayNumber() && (state.won || state.gaveUp)) {
 guessHistory = state.guessHistory || [];
 hintCount = state.hintCount || 0;
 guessHistory.forEach(g => guessedIndices.add(g.idx));
 if (state.won) {
  won = true;
  renderGuesses();
  updateStats();
  setTimeout(() => showWinModal(), 300);
 } else if (state.gaveUp) {
  gaveUp = true;
  renderGuesses();
  updateStats();
  setTimeout(() => showGiveUpModal(), 300);
 }
 }
 } catch(e) {}
}

// ============================================================
// TOAST
// ============================================================
let toastTimer;
function showToast(msg) {
 const t = document.getElementById('toast');
 t.textContent = msg;
 t.classList.add('show');
 clearTimeout(toastTimer);
 toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}


// ============================================================
// MENU
// ============================================================
function toggleMenu() {
 const dd = document.getElementById('dropdown');
 if (dd.style.display === 'none') {
  const over = won || gaveUp;
  dd.querySelectorAll('[data-game-action]').forEach(btn => {
   btn.classList.toggle('disabled', over);
  });
  dd.style.display = 'block';
 } else {
  dd.style.display = 'none';
 }
}

function closeMenu() {
 document.getElementById('dropdown').style.display = 'none';
}

document.addEventListener('click', (e) => {
 const wrap = document.getElementById('menu-wrap') || document.querySelector('.menu-wrap');
 if (wrap && !wrap.contains(e.target)) closeMenu();
});

// ============================================================
// HOW TO PLAY MODAL
// ============================================================
function showHowToPlay() {
 const overlay = document.createElement('div');
 overlay.className = 'side-modal-overlay';
 overlay.innerHTML = `
  <div class="side-modal">
   <h2>How to Play</h2>
   <p>Guess any PvZ Heroes card. Each guess is ranked by how similar it is to the secret card.</p>
   <br>
   <p style="margin-top:8px">After submitting a word, you will see its position. The secret word is <strong>#1</strong>. <strong>#2</strong> is the closest card to it.</p>
   <br>
   <p style="margin-top:10px">Similarity is based on class, type, tribes, cost, stats and keywords.</p>
   <button class="side-modal-close" onclick="this.closest('.side-modal-overlay').remove()">Close</button>
  </div>
 `;
 document.body.appendChild(overlay);
 overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
}

// ============================================================
// SETTINGS MODAL
// ============================================================
function showSettings() {
 const overlay = document.createElement('div');
 overlay.className = 'side-modal-overlay';
 overlay.innerHTML = `
  <div class="side-modal">
   <h2>Settings</h2>
   <div class="settings-label">Hint Difficulty</div>
   <div class="settings-row">
    <button class="difficulty-btn ${hintDifficulty === 'easy' ? 'active' : ''}" onclick="setDifficulty('easy', this)">
     <span class="diff-name">Easy</span>
     <span class="diff-desc">Hint position = half your closest rank</span>
    </button>
    <button class="difficulty-btn ${hintDifficulty === 'medium' ? 'active' : ''}" onclick="setDifficulty('medium', this)">
     <span class="diff-name">Medium</span>
     <span class="diff-desc">Hint position = one less than your closest rank</span>
    </button>
    <button class="difficulty-btn ${hintDifficulty === 'hard' ? 'active' : ''}" onclick="setDifficulty('hard', this)">
     <span class="diff-name">Hard</span>
     <span class="diff-desc">Hint position = random</span>
    </button>
   </div>
   <button class="side-modal-close" onclick="this.closest('.side-modal-overlay').remove()">Close</button>
  </div>
 `;
 document.body.appendChild(overlay);
 overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
}

function setDifficulty(level, btn) {
 hintDifficulty = level;
 localStorage.setItem('pvz-hint-difficulty', level);
 btn.closest('.settings-row').querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
 btn.classList.add('active');
}

// ============================================================
// HINT
// ============================================================
function useHint() {
 if (won || gaveUp) return;

 const ranking = RANKINGS[secretIdx]; // sorted best to worst, 0-indexed
 const total = ranking.length;

 // Calculate target rank based on difficulty
 const realGuesses = guessHistory.filter(g => !g.isHint);
 let targetRank;

 if (hintDifficulty === 'easy') {
  // Use best rank from ALL guesses (including hints) to chain hints
  const bestRank = guessHistory.length > 0
   ? Math.min(...guessHistory.map(g => g.rank).filter(r => r > 1))
   : 100;
  targetRank = Math.max(2, Math.floor(bestRank / 2));
 } else if (hintDifficulty === 'medium') {
  const bestRank = guessHistory.length > 0
   ? Math.min(...guessHistory.map(g => g.rank).filter(r => r > 1))
   : 100;
  targetRank = Math.max(2, bestRank - 1);
 } else {
  // hard: random rank between 2 and total
  targetRank = Math.floor(Math.random() * (total - 1)) + 2;
 }

 // rank #2 = ranking[0], rank N = ranking[N-2]
 // Slide down from targetRank until we find an unguessed card
 let hintPos = targetRank;
 let hintCardIdx = null;

 while (hintPos <= total + 1) {
  const candidate = ranking[hintPos - 2];
  if (candidate !== undefined && !guessedIndices.has(candidate)) {
   hintCardIdx = candidate;
   break;
  }
  hintPos++;
 }

 if (hintCardIdx === null) {
  showToast('No more hints available!');
  return;
 }

 guessedIndices.add(hintCardIdx);
 hintCount++;

 guessHistory.push({ idx: hintCardIdx, rank: hintPos, temp: getTemperature(hintPos), isHint: true });
 guessHistory.sort((a, b) => {
  if (a.rank === 1) return -1;
  if (b.rank === 1) return 1;
  return a.rank - b.rank;
 });

 saveState();
 renderGuesses();
 updateStats();
}

// ============================================================
// GIVE UP
// ============================================================
function giveUp() {
 if (won || gaveUp) return;
 gaveUp = true;
 showGiveUpModal();
}

function showGiveUpModal() {
 const existing = document.querySelector('.modal-overlay');
 if (existing) existing.remove();

 const card = CARDS[secretIdx];
 const guesses = guessHistory.filter(g => !g.isHint).length;
 const PAGE = 10;
 let loadedUpTo = 0;

 const modal = document.createElement('div');
 modal.className = 'modal-overlay';
 modal.innerHTML = `
  <div class="modal">
   <div class="modal-emoji" style="font-size:1rem;letter-spacing:2px;color:var(--text-muted);font-weight:800;text-transform:uppercase;">PVZ HEROES</div>
   <div class="modal-title" style="color:var(--red)">You gave up!</div>
   <div class="modal-sub">The card was <strong>${card.name}</strong> — better luck tomorrow!</div>

   <div class="modal-card-reveal">
    <img src="${card.image}" alt="${card.name}"
     onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2264%22 height=%2264%22><rect fill=%22%23333%22 width=%2264%22 height=%2264%22 rx=%228%22/></svg>'">
    <div>
     <div class="modal-card-name">${card.name}</div>
     <div class="modal-card-stats">
      ${card.class} · ${card.type}<br>
      ${card.tribes.length ? card.tribes.join(', ') + ' · ' : ''}Cost ${card.cost}<br>
      ${card.keywords.length ? card.keywords.join(', ') : 'No keywords'}
     </div>
    </div>
   </div>

   <div class="modal-stats">
    <div class="modal-stat">
     <div class="ms-val">${guesses}</div>
     <div class="ms-lbl">Guesses</div>
    </div>
    <div class="modal-stat">
     <div class="ms-val">${hintCount}</div>
     <div class="ms-lbl">Hints</div>
    </div>
   </div>

   <div class="top10-section-wrap"><div class="top10-section">
    <div class="top10-title">Closest cards to ${card.name}</div>
    <div class="top10-list" id="modal-top-list"></div>
    <div class="top10-sentinel" id="top10-sentinel"></div>
   </div></div>

   <button class="modal-btn" style="background:var(--red)" onclick="this.closest('.modal-overlay').remove()">Close</button>
  </div>
 `;
 document.body.appendChild(modal);

 const listEl = modal.querySelector('#modal-top-list');
 renderTopNItems(listEl, 0, PAGE);
 loadedUpTo = PAGE;

 const sentinel = modal.querySelector('#top10-sentinel');
 const total = RANKINGS[secretIdx].length;

 const observer = new IntersectionObserver((entries) => {
  if (entries[0].isIntersecting && loadedUpTo < total) {
   const next = Math.min(loadedUpTo + PAGE, total);
   renderTopNItems(listEl, loadedUpTo, next);
   loadedUpTo = next;
  }
 }, { root: modal.querySelector('.top10-section'), threshold: 0.1 });

 observer.observe(sentinel);
}

// ============================================================
// BOOT
// ============================================================
init();
</script>
</body>
</html>
